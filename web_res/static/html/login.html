<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 分段回复管理</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <!-- Logo -->
            <div class="logo-section">
                <div class="logo-icon">
                    <i class="material-icons">psychology</i>
                </div>
                <h1>分段回复管理</h1>
                <p class="subtitle">AstrBot 插件控制面板</p>
            </div>

            <!-- 错误消息 -->
            <div id="errorMessage" class="message message-error" style="display: none;"></div>
            <div id="successMessage" class="message message-success" style="display: none;"></div>

            <!-- 登录表单 -->
            <form id="loginForm">
                <div class="form-group">
                    <label for="password">登录密码</label>
                    <input type="password" id="password" class="form-input" 
                           placeholder="请输入登录密码" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
                    <span id="btnText">登录</span>
                    <div id="loadingSpinner" style="display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; margin-left: 8px; animation: spin 1s linear infinite;"></div>
                </button>
            </form>

            <!-- 安全提示 -->
            <div style="margin-top: 20px; text-align: center;">
                <small style="color: var(--text-secondary);">
                    <i class="material-icons" style="font-size: 14px; vertical-align: middle;">shield</i>
                    请确保在安全环境中使用
                </small>
            </div>
        </div>
    </div>

    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('loginForm');
            const passwordInput = document.getElementById('password');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const loadingSpinner = document.getElementById('loadingSpinner');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');

            // 自动聚焦密码输入框
            passwordInput.focus();

            function showError(message) {
                errorMessage.textContent = message;
                errorMessage.style.display = 'block';
                successMessage.style.display = 'none';
                
                // 添加抖动动画
                errorMessage.style.animation = 'shake 0.5s ease-in-out';
                setTimeout(() => errorMessage.style.animation = '', 500);
            }

            function showSuccess(message) {
                successMessage.textContent = message;
                successMessage.style.display = 'block';
                errorMessage.style.display = 'none';
            }

            function setLoading(loading) {
                if (loading) {
                    btnText.textContent = '登录中...';
                    loadingSpinner.style.display = 'block';
                    submitBtn.disabled = true;
                } else {
                    btnText.textContent = '登录';
                    loadingSpinner.style.display = 'none';
                    submitBtn.disabled = false;
                }
            }

            // 登录表单提交
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const password = passwordInput.value.trim();
                if (!password) {
                    showError('请输入密码');
                    passwordInput.focus();
                    return;
                }

                setLoading(true);

                try {
                    const response = await fetch('/miastrbot/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ password: password })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        showSuccess('登录成功，正在跳转...');
                        setTimeout(() => {
                            window.location.href = '/miastrbot/';
                        }, 1000);
                    } else {
                        showError(data.message || '密码错误');
                        passwordInput.value = '';
                        passwordInput.focus();
                    }
                } catch (error) {
                    console.error('登录失败:', error);
                    showError('网络连接失败，请检查网络后重试');
                } finally {
                    setLoading(false);
                }
            });

            // Enter 键提交
            passwordInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    form.dispatchEvent(new Event('submit'));
                }
            });
        });
    </script>
</body>
</html>
